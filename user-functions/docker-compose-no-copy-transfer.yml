version: "3.7"

services:
#  zipkin:
#    image: openzipkin/zipkin
#    ports:
#      - 9411:9411

  dQP:
    image: vhiveease/dqp:capnp
    env_file:
      - xdt.env
      - network.env
    expose:
      - "50006"
      - "50008"

  gx:
    image: vhiveease/gx:capnp
    env_file:
      - xdt.env
      - network.env
    expose:
      - "50007"
    depends_on:
      - dQP

  fx:
    image: vhiveease/fx:capnp
    env_file:
      - xdt.env
      - network.env
    environment:
      - NO_COPY=true
    expose:
      - "50004"
    command:
      - -url=dQP:50006
      - -dockerCompose
    depends_on:
      - gx
      - dQP