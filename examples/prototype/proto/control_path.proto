// control path request
syntax = "proto3";

option go_package = "github.com/ease-lab/vhive_stealth/examples/prototype/proto/control_path";

package proto_gen;

service CallFn {
    rpc CallFn (Request) returns () {}
}

message Request {
    string key = 1;
    // will be patched later by destination QP
    bytes data = 2;
}
