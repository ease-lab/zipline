// Pull data from the source QP
syntax = "proto3";

option go_package = "github.com/ease-lab/vhive_stealth/examples/prototype/proto/crossXDT";

package crossXDT;

service StreamData {
  rpc ServeData (Request) returns (stream Response) {}
}

message Request {
  string key = 1;
  int64 chunk_size = 2;
}

message Response {
  bytes chunk = 1;
}

