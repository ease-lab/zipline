// Pull data from the source QP
syntax = "proto3";

option go_package = "github.com/ease-lab/vhive_stealth/examples/prototype/proto/pull_data";

package proto_gen;

service StreamData {
  rpc PullData (Request) returns (sream Response) {}
}

message Request {
  string key = 1;
}

message Response {
  bytes chunk = 1;
}

