name: XDT tests

on:
  push:
    branches: [ main_xdt ]
    paths:
      - 'examples/prototype/**'
      - '.github/workflows/xdt_tests.yml'
  pull_request:
    branches: [ main_xdt ]
    paths:
      - 'examples/prototype/**'
      - '.github/workflows/xdt_tests.yml'
  workflow_dispatch:

env:
  GOOS: linux
  GO111MODULE: on

jobs:
  Test:
    name: Test
    runs-on: [self-hosted]
    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integ, timeout, parallel-invoke, fan-in, fan-out]
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v2
      with:
        go-version: 1.16
    - name: Check out code into the Go module directory
      uses: actions/checkout@v2
    - name: Run test
      run: cd examples/prototype && make ${{ matrix.test-type }}-test
  
  CodeLint:
    name: Test Code quality
    runs-on: [self-hosted]
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Check sdk code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: examples/prototype/sdk
          args: --timeout 5m
      - name: Check dQP code
        if: ${{ always() }}
        env:
          DIR: examples/prototype/dQP
        run: cd $DIR && golangci-lint run --out-format=github-actions --path-prefix=$DIR --timeout 5m
      - name: Check plotter code
        if: ${{ always() }}
        env:
          DIR: examples/prototype/plotter
        run: cd $DIR && golangci-lint run --out-format=github-actions --path-prefix=$DIR --timeout 5m
      - name: Check sQP code
        if: ${{ always() }}
        env:
          DIR: examples/prototype/sQP
        run: cd $DIR && golangci-lint run --out-format=github-actions --path-prefix=$DIR --timeout 5m
      - name: Check user-functions/fx code
        if: ${{ always() }}
        env:
          DIR: examples/prototype/user-functions/fx
        run: cd $DIR && golangci-lint run --out-format=github-actions --path-prefix=$DIR --timeout 5m
      - name: Check user-functions/gx code
        if: ${{ always() }}
        env:
          DIR: examples/prototype/user-functions/gx
        run: cd $DIR && golangci-lint run --out-format=github-actions --path-prefix=$DIR --timeout 5m
  Benchmark:
    name: Benchmark XDT
    runs-on: [self-hosted]
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@v2
        with:
          go-version: 1.16
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Run benchmarks
        run: |
          sed -i '/Routing/c\  "Routing": "CutThrough",' examples/prototype/config.json
          cd examples/prototype/sdk && go test ./integration_test.go -run TestBenchmark_XDT -v
      - name: Archive log artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v2
        with:
          name: XDT benchmarks
          path: |
            examples/prototype/sdk/*.png

  Python-SDK-Test:
    name: Test
    runs-on: [ self-hosted ]
    strategy:
      fail-fast: false
      matrix:
        test-type: [ unit, integ, timeout]
    steps:
      - name: Set up Python 3.9
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Run test
        run: cd examples/prototype && make python-${{ matrix.test-type }}-test