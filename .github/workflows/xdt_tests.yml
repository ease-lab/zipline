name: XDT tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

env:
  GOOS: linux
  GO111MODULE: on

jobs:
  Test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integ, parallel-invoke, fan-in, fan-out, get-put]
    steps:
    - name: Set up Go 1.x
      uses: actions/setup-go@v2
      with:
        go-version: 1.18
    - name: Check out code into the Go module directory
      uses: actions/checkout@v2
    - name: Run test
      run: make ${{ matrix.test-type }}-test
  
  CodeLint:
    name: Test Code quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Check sdk code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: sdk/golang
          args: "--timeout 5m -e \"S1000: should use a simple channel send/receive instead of \\`select\\` with a single case\""
      - name: Check dQP code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: queue-proxy/dQP
          args: "--timeout 5m -e \"S1000: should use a simple channel send/receive instead of \\`select\\` with a single case\""
      - name: Check plotter code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: plotter
          args: "--timeout 5m -e \"S1000: should use a simple channel send/receive instead of \\`select\\` with a single case\""
      - name: Check user-functions/fx code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: user-functions/fx
          args: "--timeout 5m -e \"S1000: should use a simple channel send/receive instead of \\`select\\` with a single case\""
      - name: Check user-functions/gx code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: user-functions/gx
          args: "--timeout 5m -e \"S1000: should use a simple channel send/receive instead of \\`select\\` with a single case\""
      - name: Check user-functions/dQP code
        if: ${{ always() }}
        uses: golangci/golangci-lint-action@v2
        with:
          working-directory: user-functions/dQP
          args: "--timeout 5m -e \"S1000: should use a simple channel send/receive instead of \\`select\\` with a single case\""
  Benchmark:
    name: Benchmark XDT
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go 1.x
        uses: actions/setup-go@v2
        with:
          go-version: 1.18
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Run benchmarks
        run: make benchmark-XDT
      - name: Archive log artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v2
        with:
          name: XDT benchmarks
          path: |
            tests/*.png

  Python-SDK-Test:
    name: Python SDK Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-type: [integ, timeout, get-put]
        python-version: [3.7, 3.8, 3.9]
    steps:
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Go 1.x
        uses: actions/setup-go@v2
        with:
          go-version: 1.18
      - name: Install fuser
        run: sudo apt-get install psmisc
      - name: Check out code into the Go module directory
        uses: actions/checkout@v2
      - name: Run test
        run: |
          cp proto/crossXDT/crossXDT.py.capnp ./sdk/python/crossXDT.py.capnp
          make python-${{ matrix.test-type }}-test